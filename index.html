<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NS9SJB508C"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Lecture Topics Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="data.js"></script>
    
    <style>
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      .modal-enter { animation: fadeIn 0.2s ease-out; }
      @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Icons Setup
        const IconSearch = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
        const IconFileText = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>;
        const IconBookOpen = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const IconPlus = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const IconExternalLink = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>;
        const IconMicroscope = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 18h8"/><path d="M3 22h18"/><path d="M14 22a7 7 0 1 0 0-14h-1"/><path d="M9 14h2"/><path d="M9 12a2 2 0 0 1-2-2V6h6v4a2 2 0 0 1-2 2Z"/><path d="M12 6V3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3"/></svg>;
        const IconBeaker = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4.5 3h15"/><path d="M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3"/><path d="M6 14h12"/></svg>;
        const IconDroplet = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg>;
        const IconShieldAlert = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
        const IconPill = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg>;
        const IconHistory = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>;
        const IconX = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const IconCopy = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>;
        const IconCheck = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>;

        // Icon Mapping Helper
const getSubjectIcon = (iconName) => {
    // Automatically converts text to lowercase to prevent capitalization errors
    const normalizedName = iconName ? iconName.toLowerCase() : '';
    
    switch(normalizedName) {
        case 'microscope': return <IconMicroscope className="text-blue-500" size={24} />;
        case 'beaker': return <IconBeaker className="text-amber-500" size={24} />;
        case 'droplet': return <IconDroplet className="text-red-500" size={24} />;
        case 'shield': 
        case 'shieldalert': return <IconShieldAlert className="text-emerald-500" size={24} />;
        case 'pill': return <IconPill className="text-purple-500" size={24} />;
        default: return <IconBookOpen className="text-gray-500" size={24} />;
    }
};
        // Fuzzy Search Algorithm
        const isFuzzyMatch = (pattern, str) => {
          if (!pattern) return true;
          const regexPattern = pattern.split('').map(char => char.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('.*');
          const re = new RegExp(regexPattern, 'i');
          return re.test(str);
        };

        function App() {
          // initialData and changelogData are loaded from data.js
          const [data, setData] = useState(typeof initialData !== 'undefined' ? initialData : []);
          
          // Debounced Search State
          const [searchTerm, setSearchTerm] = useState("");
          const [debouncedSearch, setDebouncedSearch] = useState("");
          
          const [activeSubject, setActiveSubject] = useState("All");
          const [isChangelogOpen, setIsChangelogOpen] = useState(false);
          const [copiedId, setCopiedId] = useState(null);

          // Apply Debounce Effect (Wait 300ms after user stops typing)
          useEffect(() => {
              const timerId = setTimeout(() => {
                  setDebouncedSearch(searchTerm);
              }, 300);
              return () => clearTimeout(timerId);
          }, [searchTerm]);

          const handleUpdateLink = (subjectIdx, sectionIdx, topicId, type) => {
            const newLink = window.prompt(`Paste your ${type === 'gdoc' ? 'Google Docs' : 'NotebookLM'} URL here:`);
            if (newLink !== null && newLink.trim() !== '') {
              const newData = [...data];
              const topicIndex = newData[subjectIdx].sections[sectionIdx].topics.findIndex(t => t.id === topicId);
              if (topicIndex > -1) {
                newData[subjectIdx].sections[sectionIdx].topics[topicIndex][type] = newLink;
                setData(newData);
              }
            }
          };

          const handleCopy = (url, uniqueId) => {
            navigator.clipboard.writeText(url);
            setCopiedId(uniqueId);
            setTimeout(() => setCopiedId(null), 2000); // Reset checkmark after 2 seconds
          };

          const filteredData = useMemo(() => {
            return data
              .filter(subj => activeSubject === "All" || subj.subject === activeSubject)
              .map(subj => {
                const filteredSections = subj.sections.map(sec => ({
                  ...sec,
                  topics: sec.topics.filter(t => {
                      return t.title.toLowerCase().includes(debouncedSearch.toLowerCase()) || isFuzzyMatch(debouncedSearch, t.title);
                  })
                })).filter(sec => sec.topics.length > 0);
                return { ...subj, sections: filteredSections };
              })
              .filter(subj => subj.sections.length > 0);
          }, [data, debouncedSearch, activeSubject]);

          const totalTopics = data.reduce((acc, sub) => acc + sub.sections.reduce((a, s) => a + s.topics.length, 0), 0);

          return (
            <div className="min-h-screen p-4 md:p-8">
              <div className="max-w-7xl mx-auto mb-8">
                <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                  <div>
                    <h1 className="text-3xl font-bold text-gray-900">Lecture Archive</h1>
                    <div className="flex flex-wrap items-center gap-3 mt-2">
                        <p className="text-gray-500">Pathology and Pharmacology Hub ({totalTopics} Topics)</p>
                        <button 
                            onClick={() => setIsChangelogOpen(true)}
                            className="flex items-center gap-1.5 px-3 py-1 bg-white hover:bg-gray-100 text-gray-600 rounded-md text-xs font-medium transition-colors border border-gray-200 shadow-sm"
                        >
                            <IconHistory size={14} /> View Changelog
                        </button>
                    </div>
                  </div>
                  
                  <div className="relative w-full md:w-80">
                    <div className="absolute left-3 top-3 text-gray-400">
                        <IconSearch size={18} />
                    </div>
                    <input 
                      type="text" 
                      placeholder="Search topics (fuzzy match enabled)..." 
                      className="w-full pl-10 pr-4 py-2 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all shadow-sm bg-white"
                      value={searchTerm}
                      onChange={(e) => setSearchTerm(e.target.value)}
                    />
                  </div>
                </div>

                <div className="flex overflow-x-auto pb-2 gap-2 hide-scrollbar">
                  <button 
                    onClick={() => setActiveSubject("All")}
                    className={`px-4 py-2 rounded-full whitespace-nowrap font-medium text-sm transition-colors ${activeSubject === "All" ? "bg-gray-800 text-white" : "bg-white text-gray-600 border border-gray-200 hover:bg-gray-100"}`}
                  >
                    All Subjects
                  </button>
                  {data.map(subj => (
                    <button 
                      key={subj.subject}
                      onClick={() => setActiveSubject(subj.subject)}
                      className={`px-4 py-2 rounded-full whitespace-nowrap font-medium text-sm transition-colors flex items-center gap-2
                        ${activeSubject === subj.subject ? subj.color.replace('bg-', 'bg-opacity-100 bg-').replace('text-', 'text-white border-transparent bg-') : "bg-white text-gray-600 border border-gray-200 hover:bg-gray-100"}`}
                    >
                      {subj.subject}
                    </button>
                  ))}
                </div>
              </div>

              <div className="max-w-7xl mx-auto space-y-10">
                {filteredData.length === 0 ? (
                  <div className="text-center py-20 bg-white rounded-xl border border-gray-100 shadow-sm">
                    <div className="flex justify-center mb-4 text-gray-300">
                        <IconSearch size={48} />
                    </div>
                    <h3 className="text-xl font-medium text-gray-600">No topics found</h3>
                    <p className="text-gray-400 mt-2">Try adjusting your search or filters.</p>
                  </div>
                ) : (
                  filteredData.map((subject, sIdx) => (
                    <div key={subject.subject}>
                      <div className="flex items-center gap-3 mb-6 border-b border-gray-200 pb-2">
                        <div className={`p-2 rounded-lg ${subject.color.split(' ')[0]}`}>
                          {getSubjectIcon(subject.icon)}
                        </div>
                        <h2 className="text-2xl font-bold text-gray-800">{subject.subject}</h2>
                      </div>

                      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {subject.sections.map((section, secIdx) => (
                          <div key={section.instructor} className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col h-full">
                            <div className="bg-gray-50/80 px-4 py-3 border-b border-gray-100 flex items-center justify-between">
                              <h3 className="font-semibold text-gray-700 flex items-center gap-2">
                                {section.instructor}
                              </h3>
                              <span className="text-xs font-medium px-2 py-1 bg-gray-200 text-gray-600 rounded-full">
                                {section.topics.length} topics
                              </span>
                            </div>
                            
                            <div className="divide-y divide-gray-50 flex-grow max-h-[500px] overflow-y-auto">
                              {section.topics.map((topic) => (
                                <div key={topic.id} className="p-4 hover:bg-blue-50/30 transition-colors group">
                                  <p className="font-medium text-gray-800 mb-3 leading-snug text-sm">{topic.title}</p>
                                  
                                  <div className="flex flex-wrap gap-2">
                                    {topic.gdoc ? (
                                      <div className="flex items-center shadow-sm rounded-md">
                                          <a href={topic.gdoc} target="_blank" rel="noopener noreferrer" 
                                            className="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-l-md bg-green-50 text-green-700 border border-green-200 border-r-0 hover:bg-green-100 transition-colors">
                                            <IconFileText size={14} /> Docs <IconExternalLink size={12} className="ml-0.5 opacity-70" />
                                          </a>
                                          <button onClick={() => handleCopy(topic.gdoc, `${topic.id}-gdoc`)} title="Copy URL"
                                            className="px-2 py-1.5 bg-green-50 border border-green-200 text-green-600 hover:bg-green-100 rounded-r-md transition-colors flex items-center justify-center">
                                            {copiedId === `${topic.id}-gdoc` ? <IconCheck size={14} className="text-green-700" /> : <IconCopy size={14} />}
                                          </button>
                                      </div>
                                    ) : (
                                      <button onClick={() => handleUpdateLink(data.findIndex(d=>d.subject===subject.subject), data.findIndex(d=>d.subject===subject.subject) > -1 ? data[data.findIndex(d=>d.subject===subject.subject)].sections.findIndex(s=>s.instructor===section.instructor) : -1, topic.id, 'gdoc')}
                                        className="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-md bg-white text-gray-400 border border-dashed border-gray-300 hover:text-green-600 hover:border-green-300 hover:bg-green-50 transition-colors">
                                        <IconPlus size={14} /> Add Docs
                                      </button>
                                    )}

                                    {topic.nlm ? (
                                      <div className="flex items-center shadow-sm rounded-md">
                                          <a href={topic.nlm} target="_blank" rel="noopener noreferrer" 
                                            className="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-l-md bg-blue-50 text-blue-700 border border-blue-200 border-r-0 hover:bg-blue-100 transition-colors">
                                            <IconBookOpen size={14} /> NotebookLM <IconExternalLink size={12} className="ml-0.5 opacity-70" />
                                          </a>
                                          <button onClick={() => handleCopy(topic.nlm, `${topic.id}-nlm`)} title="Copy URL"
                                            className="px-2 py-1.5 bg-blue-50 border border-blue-200 text-blue-600 hover:bg-blue-100 rounded-r-md transition-colors flex items-center justify-center">
                                            {copiedId === `${topic.id}-nlm` ? <IconCheck size={14} className="text-blue-700" /> : <IconCopy size={14} />}
                                          </button>
                                      </div>
                                    ) : (
                                      <button onClick={() => handleUpdateLink(data.findIndex(d=>d.subject===subject.subject), data.findIndex(d=>d.subject===subject.subject) > -1 ? data[data.findIndex(d=>d.subject===subject.subject)].sections.findIndex(s=>s.instructor===section.instructor) : -1, topic.id, 'nlm')}
                                        className="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-md bg-white text-gray-400 border border-dashed border-gray-300 hover:text-blue-600 hover:border-blue-300 hover:bg-blue-50 transition-colors">
                                        <IconPlus size={14} /> Add Notebook
                                      </button>
                                    )}
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))
                )}
              </div>
              
              {/* Changelog Modal */}
              {isChangelogOpen && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900/40 backdrop-blur-sm modal-enter">
                  <div className="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden border border-gray-100">
                    <div className="flex justify-between items-center p-5 border-b border-gray-100 bg-gray-50/50">
                        <h2 className="text-lg font-bold text-gray-900 flex items-center gap-2">
                            <IconHistory className="text-blue-600"/> Updates & Changelog
                        </h2>
                        <button onClick={() => setIsChangelogOpen(false)} className="text-gray-400 hover:text-gray-600 transition-colors bg-white hover:bg-gray-100 p-1.5 rounded-full shadow-sm">
                            <IconX size={20} />
                        </button>
                    </div>
                    <div className="p-5 max-h-[60vh] overflow-y-auto space-y-6">
                        {typeof changelogData !== 'undefined' ? changelogData.map((log, index) => (
                            <div key={index} className="relative pl-4 border-l-2 border-blue-200">
                                <div className="absolute -left-1.5 top-1.5 w-3 h-3 bg-blue-500 rounded-full ring-4 ring-white"></div>
                                <div className="mb-1 flex items-baseline gap-2">
                                    <span className="font-bold text-gray-900">{log.version}</span>
                                </div>
                                <ul className="space-y-2 mt-2">
                                    {log.changes.map((change, cIdx) => (
                                        <li key={cIdx} className="text-gray-600 text-sm flex items-start gap-2">
                                            <span className="text-blue-400 mt-0.5">•</span>
                                            {change}
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        )) : <p className="text-gray-500">No changelog data found.</p>}
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
