<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NS9SJB508C"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-NS9SJB508C');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MedVault — A beautifully curated archive of medical lecture notes for Pathology, Pharmacology, Haematology and Microbiology. Instant access to Google Docs and NotebookLM.">
    <meta name="theme-color" content="#f0f2f7">
    <title>MedVault — Lecture Archive</title>

    <link rel="stylesheet" href="styles.css?v=15">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <script src="data.js"></script>

    <!-- Theme: apply saved preference before render to prevent flash -->
    <script>
      (function() {
        var saved = localStorage.getItem('medvault-theme');
        if (saved === 'light') {
          document.documentElement.setAttribute('data-theme', 'light');
          document.querySelector('meta[name="theme-color"]').setAttribute('content', '#d8dce6');
        } else {
          document.documentElement.setAttribute('data-theme', 'dark');
          document.querySelector('meta[name="theme-color"]').setAttribute('content', '#08080f');
        }
      })();
    </script>
</head>
<body>
    <!-- Animated mesh background -->
    <div class="mesh-bg" aria-hidden="true">
      <canvas id="constellation-canvas"></canvas>
    </div>
    <div class="noise-overlay" aria-hidden="true"></div>

    <!-- Liquid Glass SVG Filters -->
    <svg width="0" height="0" style="position: absolute;" aria-hidden="true">
      <defs>
        <filter id="liquid-glass" x="-5%" y="-5%" width="110%" height="110%">
          <feTurbulence type="fractalNoise" baseFrequency="0.012 0.012"
            numOctaves="3" seed="1" result="noise" />
          <feGaussianBlur in="noise" stdDeviation="3" result="softNoise" />
          <feDisplacementMap in="SourceGraphic" in2="softNoise"
            scale="5" xChannelSelector="R" yChannelSelector="G"
            result="refracted" />
        </filter>
        <filter id="liquid-glass-heavy" x="-5%" y="-5%" width="110%" height="110%">
          <feTurbulence type="fractalNoise" baseFrequency="0.008 0.008"
            numOctaves="4" seed="2" result="noiseHeavy" />
          <feGaussianBlur in="noiseHeavy" stdDeviation="4" result="softNoiseHeavy" />
          <feDisplacementMap in="SourceGraphic" in2="softNoiseHeavy"
            scale="8" xChannelSelector="R" yChannelSelector="G"
            result="refractedHeavy" />
        </filter>
      </defs>
    </svg>

    <div id="root"></div>

    <script src="constellation.js?v=3"></script>
    <script src="data.js?v=13"></script>
    <script src="app.js?v=15"></script>
</body>
</html>
